  <g transform="translate(406, 445)"><rect width="150" height="36" rx="18" fill="#21262d" stroke="#30363d"/><text x="20" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#39d353">MIT License</text></g>
  <g transform="translate(570, 445)"><rect width="180" height="36" rx="18" fill="#21262d" stroke="#30363d"/><text x="20" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#34d399">Auto-Update CI</text></g>
